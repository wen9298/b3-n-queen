<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>n-Queen Problem Solver</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', monospace;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.25rem;
      color: #1a1a1a;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 1.8rem;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
      margin-bottom: 1.4rem;
    }

    .controls label { color: #333; }

    input[type=number] {
      width: 64px;
      padding: 0.35rem 0.6rem;
      background: #fff;
      color: #1a1a1a;
      border: 1px solid #bbb;
      border-radius: 5px;
      font-family: inherit;
      font-size: 1rem;
      text-align: center;
    }

    button {
      padding: 0.35rem 1.3rem;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      font-family: inherit;
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    button:hover { background: #444; }

    /* ── Summary ── */
    #summary {
      font-size: 0.95rem;
      color: #333;
      margin-bottom: 1.1rem;
      min-height: 1.3rem;
    }

    /* ── Pagination ── */
    #navBar {
      display: none;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }
    .nav-btn {
      padding: 0.3rem 0.9rem;
      background: #fff;
      color: #1a1a1a;
      border: 1px solid #bbb;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: #eee; }
    .nav-btn:disabled { opacity: 0.35; cursor: default; }
    #pageInfo {
      font-size: 0.88rem;
      color: #555;
      min-width: 80px;
      text-align: center;
    }

    /* ── Solution block ── */
    .solution-block {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1.2rem;
      max-width: 860px;
    }

    .solution-title {
      font-size: 0.95rem;
      font-weight: bold;
      color: #1a1a1a;
      margin-bottom: 0.9rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #e0e0e0;
    }

    /* Section labels — only colour used to distinguish the 3 sections */
    .section-label {
      font-size: 0.78rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #555;
      margin-bottom: 0.35rem;
    }

    /* ── (1) 1D Array ── */
    .array-1d {
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      padding: 0.45rem 0.8rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: #1a1a1a;
      word-break: break-all;
    }

    /* ── (2) 2D Array ── */
    .array-2d-wrap { margin-bottom: 1rem; }
    .array-2d {
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      padding: 0.45rem 0.8rem;
      white-space: pre;
      font-size: 0.87rem;
      color: #1a1a1a;
      overflow-x: auto;
    }

    /* ── (3) StringGrid ── */
    .grid-wrap { margin-bottom: 0.4rem; }
    table.grid {
      border-collapse: collapse;
      margin-top: 0.5rem;
    }
    table.grid td {
      width: 38px;
      height: 38px;
      text-align: center;
      vertical-align: middle;
      font-size: 0.95rem;
      font-weight: bold;
      border: 1px solid #ccc;
    }
    /* Checkerboard: two neutral greys — no extra colours */
    table.grid tr:nth-child(odd) td:nth-child(odd),
    table.grid tr:nth-child(even) td:nth-child(even) {
      background: #fff;
    }
    table.grid tr:nth-child(odd) td:nth-child(even),
    table.grid tr:nth-child(even) td:nth-child(odd) {
      background: #efefef;
    }
    /* Queen cell: black background + white text — only accent used */
    table.grid td.queen {
      background: #1a1a1a !important;
      color: #fff;
    }
    table.grid td.empty { color: #bbb; }
  </style>
</head>
<body>

<h1>n-Queen Problem Solver</h1>
<p class="subtitle">Place n queens on an n&times;n board so that no two queens threaten each other.</p>

<div class="controls">
  <label for="nInput">Board size n =</label>
  <input type="number" id="nInput" value="4" min="1" max="12">
  <button onclick="runSolver()">Solve</button>
</div>

<div id="summary"></div>
<div id="navBar">
  <button class="nav-btn" id="btnPrev" onclick="showPage(currentPage - 1)">&#8592; Prev</button>
  <span id="pageInfo"></span>
  <button class="nav-btn" id="btnNext" onclick="showPage(currentPage + 1)">Next &#8594;</button>
</div>
<div id="output"></div>

<script>
  let n, queens, solutions;
  let currentPage = 0;
  const PAGE_SIZE = 10;

  function isValid(row, col) {
    for (let i = 0; i < row; i++) {
      if (queens[i] === col) return false;
      if (Math.abs(queens[i] - col) === Math.abs(i - row)) return false;
    }
    return true;
  }

  function solve(row) {
    if (row === n) { solutions.push([...queens]); return; }
    for (let col = 0; col < n; col++) {
      if (isValid(row, col)) { queens[row] = col; solve(row + 1); }
    }
  }

  function renderSolution(sol, globalIdx) {
    const div = document.createElement('div');
    div.className = 'solution-block';

    const title = document.createElement('div');
    title.className = 'solution-title';
    title.textContent = 'Solution ' + (globalIdx + 1);
    div.appendChild(title);

    // (1) 1D Array
    const lbl1 = document.createElement('div');
    lbl1.className = 'section-label';
    lbl1.textContent = '(1) 1D Array Representation';
    div.appendChild(lbl1);
    const arr1d = document.createElement('div');
    arr1d.className = 'array-1d';
    arr1d.textContent = 's[] = { ' + sol.map((v, i) => 's[' + i + ']=' + v).join(',  ') + ' }';
    div.appendChild(arr1d);

    // (2) 2D Array
    const lbl2 = document.createElement('div');
    lbl2.className = 'section-label';
    lbl2.textContent = '(2) 2D Array Representation';
    div.appendChild(lbl2);
    const wrap2d = document.createElement('div');
    wrap2d.className = 'array-2d-wrap';
    const arr2d = document.createElement('div');
    arr2d.className = 'array-2d';
    let s2d = '';
    for (let i = 0; i < n; i++) {
      const row = Array.from({ length: n }, (_, j) => sol[i] === j ? 'Q' : '.');
      s2d += 'q[' + i + '] = [ ' + row.join(', ') + ' ]\n';
    }
    arr2d.textContent = s2d.trimEnd();
    wrap2d.appendChild(arr2d);
    div.appendChild(wrap2d);

    // (3) StringGrid
    const lbl3 = document.createElement('div');
    lbl3.className = 'section-label';
    lbl3.textContent = '(3) 2D StringGrid';
    div.appendChild(lbl3);
    const gWrap = document.createElement('div');
    gWrap.className = 'grid-wrap';
    const table = document.createElement('table');
    table.className = 'grid';
    for (let i = 0; i < n; i++) {
      const tr = document.createElement('tr');
      for (let j = 0; j < n; j++) {
        const td = document.createElement('td');
        if (sol[i] === j) { td.className = 'queen'; td.textContent = 'Q'; }
        else { td.className = 'empty'; td.textContent = '.'; }
        tr.appendChild(td);
      }
      table.appendChild(tr);
    }
    gWrap.appendChild(table);
    div.appendChild(gWrap);
    return div;
  }

  function showPage(page) {
    const output = document.getElementById('output');
    const navBar = document.getElementById('navBar');
    const totalPages = Math.ceil(solutions.length / PAGE_SIZE);
    if (page < 0 || page >= totalPages) return;
    currentPage = page;
    output.innerHTML = '';
    const start = page * PAGE_SIZE;
    const end = Math.min(start + PAGE_SIZE, solutions.length);
    for (let i = start; i < end; i++) output.appendChild(renderSolution(solutions[i], i));
    document.getElementById('pageInfo').textContent = 'Page ' + (page + 1) + ' / ' + totalPages;
    document.getElementById('btnPrev').disabled = page === 0;
    document.getElementById('btnNext').disabled = page === totalPages - 1;
    navBar.style.display = totalPages > 1 ? 'flex' : 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function runSolver() {
    n = parseInt(document.getElementById('nInput').value);
    const summary = document.getElementById('summary');
    document.getElementById('output').innerHTML = '';
    document.getElementById('navBar').style.display = 'none';
    summary.textContent = '';
    if (isNaN(n) || n <= 0 || n > 12) {
      summary.textContent = 'Please enter a valid n between 1 and 12.';
      return;
    }
    queens = new Array(n).fill(-1);
    solutions = [];
    solve(0);
    summary.textContent = 'Total: ' + solutions.length + ' solution' + (solutions.length !== 1 ? 's' : '') + ' to the ' + n + '-Queen problem.';
    currentPage = 0;
    showPage(0);
  }

  runSolver();
</script>
</body>
</html>
